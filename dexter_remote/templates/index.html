<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dexter Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F916;</text></svg>">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: #111128;
            --bg-input: #0d0d20;
            --border: #1e1e40;
            --border-light: #2a2a55;
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.15);
            --cyan-glow: rgba(0, 212, 255, 0.3);
            --green: #00e676;
            --red: #ff4444;
            --orange: #ffa726;
            --purple: #b388ff;
            --text: #e0e0e0;
            --text-dim: #777;
            --text-muted: #555;
            --radius: 10px;
        }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--cyan);
            letter-spacing: 3px;
            text-shadow: 0 0 20px var(--cyan-glow);
        }
        .logo-sub {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            font-weight: 400;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.75rem;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red);
            margin-right: 6px;
            transition: background 0.3s;
        }
        .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .metric-pill {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }
        .metric-pill .val { color: var(--cyan); font-weight: 700; }

        /* ===== GRID ===== */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 800px) {
            .dashboard { grid-template-columns: 1fr; padding: 12px; }
            .header { flex-wrap: wrap; gap: 10px; }
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-light); }
        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .card-full { grid-column: 1 / -1; }

        /* ===== LIVE JOINT MONITOR ===== */
        .joint-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .joint-row:last-child { margin-bottom: 0; }
        .joint-label {
            width: 70px;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: right;
            flex-shrink: 0;
        }
        .joint-bar-bg {
            flex: 1;
            height: 20px;
            background: var(--bg-primary);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .joint-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.15s ease-out;
            position: absolute;
            top: 0;
        }
        .joint-bar-center {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--text-muted);
            left: 50%;
        }
        .joint-val {
            width: 110px;
            font-size: 0.7rem;
            color: var(--cyan);
            font-variant-numeric: tabular-nums;
            text-align: right;
            flex-shrink: 0;
        }

        /* ===== JOINT CONTROL SLIDERS ===== */
        .slider-group { margin-bottom: 14px; }
        .slider-group:last-child { margin-bottom: 0; }
        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .slider-name {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .slider-value {
            font-size: 0.7rem;
            color: var(--cyan);
            font-variant-numeric: tabular-nums;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            outline: none;
            border: 1px solid var(--border);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--cyan);
            cursor: pointer;
            border: 2px solid var(--bg-card);
            box-shadow: 0 0 6px var(--cyan-glow);
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--cyan);
            cursor: pointer;
            border: 2px solid var(--bg-card);
        }
        input[type="range"]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        input[type="range"]:disabled::-webkit-slider-thumb {
            background: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ===== TASK BUTTONS ===== */
        .task-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .btn-task {
            padding: 12px 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-task:hover:not(:disabled) {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-dim);
            transform: translateY(-1px);
        }
        .btn-task:active:not(:disabled) { transform: translateY(0); }
        .btn-task:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        .btn-task.active {
            border-color: var(--orange);
            color: var(--orange);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 167, 38, 0.3); }
            50% { box-shadow: 0 0 12px 0 rgba(255, 167, 38, 0.15); }
        }

        /* ===== VOICE ===== */
        .voice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .btn-mic {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-mic:hover { background: var(--cyan-dim); }
        .btn-mic.listening {
            border-color: var(--red);
            background: rgba(255, 68, 68, 0.15);
            color: var(--red);
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.3); }
            50% { box-shadow: 0 0 0 12px rgba(255, 68, 68, 0); }
        }
        .voice-hints {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }
        .voice-hints strong { color: var(--text-dim); }
        .transcript-box {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
            font-style: italic;
            min-height: 30px;
        }
        .no-speech {
            font-size: 0.7rem;
            color: var(--orange);
            background: rgba(255, 167, 38, 0.08);
            border: 1px solid rgba(255, 167, 38, 0.2);
            border-radius: 6px;
            padding: 8px;
        }

        /* ===== SAVED POSES ===== */
        .pose-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .pose-name-input {
            flex: 1;
            padding: 6px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.75rem;
            outline: none;
        }
        .pose-name-input:focus { border-color: var(--cyan); }
        .pose-name-input::placeholder { color: var(--text-muted); }
        .btn-sm {
            padding: 6px 14px;
            border: 1px solid var(--cyan);
            border-radius: 6px;
            background: transparent;
            color: var(--cyan);
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .btn-sm:hover { background: var(--cyan-dim); }
        .btn-sm.danger { border-color: var(--red); color: var(--red); }
        .btn-sm.danger:hover { background: rgba(255, 68, 68, 0.1); }
        .pose-list { max-height: 180px; overflow-y: auto; }
        .pose-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
        }
        .pose-item:last-child { border-bottom: none; }
        .pose-item-name { color: var(--text); font-weight: 600; }
        .pose-item-vals { color: var(--text-muted); font-size: 0.65rem; margin-left: 8px; }
        .pose-item-actions { display: flex; gap: 6px; }
        .pose-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 16px 0;
        }

        /* ===== METRICS ===== */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .metric-box {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .metric-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--cyan);
            line-height: 1.2;
        }
        .metric-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .metric-number.green { color: var(--green); }
        .metric-number.orange { color: var(--orange); }

        /* ===== ACTIVITY LOG ===== */
        .log-box {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            max-height: 220px;
            overflow-y: auto;
            font-size: 0.7rem;
            line-height: 1.7;
        }
        .log-entry { padding: 1px 0; }
        .log-t { color: var(--text-muted); }
        .log-ok { color: var(--green); }
        .log-err { color: var(--red); }
        .log-info { color: var(--cyan); }
        .log-warn { color: var(--orange); }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <div>
                <div class="logo">DEXTER</div>
                <div class="logo-sub">3-DOF Robotic Arm Dashboard</div>
            </div>
        </div>
        <div class="header-right">
            <span>
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </span>
            <span class="metric-pill">Tasks: <span class="val" id="headerTasks">0</span></span>
            <span class="metric-pill">Success: <span class="val" id="headerRate">0%</span></span>
        </div>
    </div>

    <!-- ===== DASHBOARD GRID ===== -->
    <div class="dashboard">

        <!-- Live Joint Monitor -->
        <div class="card">
            <div class="card-title">Live Joint Monitor</div>
            <div id="jointMonitor">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Joint Control -->
        <div class="card">
            <div class="card-title">Joint Control</div>
            <div id="jointSliders">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Task Commands -->
        <div class="card">
            <div class="card-title">Preset Tasks</div>
            <div class="task-grid">
                <button class="btn-task" id="btnHome" onclick="sendTask(0)">Home</button>
                <button class="btn-task" id="btnPick" onclick="sendTask(1)">Pick</button>
                <button class="btn-task" id="btnSleep" onclick="sendTask(2)">Sleep</button>
            </div>
            <div id="taskStatus" style="font-size:0.7rem; color:var(--text-muted); margin-top:10px; min-height:18px;"></div>
        </div>

        <!-- Voice Control -->
        <div class="card">
            <div class="card-title">Voice Control</div>
            <div class="voice-area">
                <button class="btn-mic" id="voiceBtn" onclick="toggleVoice()">&#x1F3A4;</button>
                <div class="voice-hints">
                    Say: <strong>home</strong>, <strong>pick</strong>, <strong>sleep</strong>, or <strong>wake</strong>
                </div>
                <div class="transcript-box" id="transcript">Press microphone to start...</div>
                <div id="speechWarning"></div>
            </div>
        </div>

        <!-- Saved Poses -->
        <div class="card">
            <div class="card-title">Saved Poses</div>
            <div class="pose-controls">
                <input type="text" class="pose-name-input" id="poseName" placeholder="Pose name..." maxlength="32">
                <button class="btn-sm" onclick="saveCurrentPose()">Save</button>
            </div>
            <div class="pose-list" id="poseList">
                <div class="pose-empty">No saved poses yet</div>
            </div>
        </div>

        <!-- Metrics -->
        <div class="card">
            <div class="card-title">Task Metrics</div>
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-number" id="metricSent">0</div>
                    <div class="metric-label">Tasks Sent</div>
                </div>
                <div class="metric-box">
                    <div class="metric-number green" id="metricRate">0%</div>
                    <div class="metric-label">Success Rate</div>
                </div>
                <div class="metric-box">
                    <div class="metric-number orange" id="metricAvg">0s</div>
                    <div class="metric-label">Avg Time</div>
                </div>
                <div class="metric-box">
                    <div class="metric-number" id="metricFailed">0</div>
                    <div class="metric-label">Failed</div>
                </div>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="card card-full">
            <div class="card-title">Activity Log</div>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
    (function() {
        'use strict';

        // =====================================================================
        // Configuration (fetched from backend, with sensible defaults)
        // =====================================================================
        const JOINT_CONFIG = [
            { name: 'joint_1', label: 'Base',     min: -1.5708, max:  1.5708, group: 'arm' },
            { name: 'joint_2', label: 'Shoulder', min: -1.5708, max:  1.5708, group: 'arm' },
            { name: 'joint_3', label: 'Elbow',    min: -1.5708, max:  1.5708, group: 'arm' },
            { name: 'joint_4', label: 'Gripper',  min: -1.5708, max:  0.0,    group: 'gripper' },
        ];
        const COLORS = ['#00d4ff', '#00e676', '#b388ff', '#ffa726'];

        // =====================================================================
        // State
        // =====================================================================
        let taskInProgress = false;
        let sliderPositions = [0, 0, 0, -0.7]; // current slider target values
        let sliderThrottleTimer = null;
        const SLIDER_THROTTLE_MS = 100;

        // =====================================================================
        // Utility
        // =====================================================================
        function rad2deg(r) { return (r * 180 / Math.PI).toFixed(1); }
        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
        function ts() { return new Date().toLocaleTimeString('en-GB', { hour12: false }); }

        // =====================================================================
        // Activity Log
        // =====================================================================
        function log(msg, type) {
            const box = document.getElementById('logBox');
            const cls = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : type === 'warn' ? 'log-warn' : 'log-info';
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-t">[${ts()}]</span> <span class="${cls}">${msg}</span>`;
            box.prepend(div);
            // Keep max 200 entries
            while (box.children.length > 200) box.removeChild(box.lastChild);
        }

        // =====================================================================
        // Build joint monitor rows
        // =====================================================================
        function buildJointMonitor() {
            const container = document.getElementById('jointMonitor');
            container.innerHTML = JOINT_CONFIG.map((jc, i) => `
                <div class="joint-row">
                    <div class="joint-label">${jc.label}</div>
                    <div class="joint-bar-bg">
                        <div class="joint-bar-center"></div>
                        <div class="joint-bar-fill" id="jbar${i}" style="background:${COLORS[i]}; width:50%; left:0;"></div>
                    </div>
                    <div class="joint-val" id="jval${i}">0.000 rad / 0.0&deg;</div>
                </div>
            `).join('');
        }

        function updateJointMonitor(joints) {
            JOINT_CONFIG.forEach((jc, i) => {
                const pos = joints[jc.name] ?? 0;
                const range = jc.max - jc.min;
                const pct = ((pos - jc.min) / range) * 100;
                const bar = document.getElementById(`jbar${i}`);
                const val = document.getElementById(`jval${i}`);
                if (bar) {
                    // For symmetric ranges, show bar from center; for asymmetric, from left
                    if (jc.min < 0 && jc.max > 0) {
                        const centerPct = ((0 - jc.min) / range) * 100;
                        if (pos >= 0) {
                            bar.style.left = centerPct + '%';
                            bar.style.width = (pct - centerPct) + '%';
                        } else {
                            bar.style.left = pct + '%';
                            bar.style.width = (centerPct - pct) + '%';
                        }
                    } else {
                        bar.style.left = '0%';
                        bar.style.width = pct + '%';
                    }
                    bar.style.opacity = '0.7';
                }
                if (val) {
                    val.textContent = `${pos.toFixed(3)} rad / ${rad2deg(pos)}\u00B0`;
                }
            });
        }

        // =====================================================================
        // Build joint control sliders
        // =====================================================================
        function buildSliders() {
            const container = document.getElementById('jointSliders');
            container.innerHTML = JOINT_CONFIG.map((jc, i) => `
                <div class="slider-group">
                    <div class="slider-header">
                        <span class="slider-name">${jc.label}</span>
                        <span class="slider-value" id="sval${i}">${sliderPositions[i].toFixed(2)} rad / ${rad2deg(sliderPositions[i])}&deg;</span>
                    </div>
                    <input type="range" id="slider${i}" min="${jc.min}" max="${jc.max}" step="0.01"
                           value="${sliderPositions[i]}" data-index="${i}" class="joint-slider">
                </div>
            `).join('');

            // Attach event listeners
            container.querySelectorAll('.joint-slider').forEach(slider => {
                slider.addEventListener('input', onSliderInput);
            });
        }

        function onSliderInput(e) {
            const idx = parseInt(e.target.dataset.index);
            const val = parseFloat(e.target.value);
            sliderPositions[idx] = val;

            // Update label immediately
            const label = document.getElementById(`sval${idx}`);
            if (label) label.textContent = `${val.toFixed(2)} rad / ${rad2deg(val)}\u00B0`;

            // Throttle the publish
            if (sliderThrottleTimer) clearTimeout(sliderThrottleTimer);
            sliderThrottleTimer = setTimeout(publishSliderPositions, SLIDER_THROTTLE_MS);
        }

        function publishSliderPositions() {
            fetch('/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ positions: sliderPositions, duration: 0.5 })
            }).catch(err => log('Slider move error: ' + err.message, 'err'));
        }

        function setSliderValues(positions) {
            positions.forEach((val, i) => {
                sliderPositions[i] = val;
                const slider = document.getElementById(`slider${i}`);
                const label = document.getElementById(`sval${i}`);
                if (slider) slider.value = val;
                if (label) label.textContent = `${val.toFixed(2)} rad / ${rad2deg(val)}\u00B0`;
            });
        }

        function setSlidersEnabled(enabled) {
            document.querySelectorAll('.joint-slider').forEach(s => s.disabled = !enabled);
        }

        // =====================================================================
        // Preset Tasks
        // =====================================================================
        const TASK_NAMES = { 0: 'Home', 1: 'Pick', 2: 'Sleep' };
        const TASK_BTNS = { 0: 'btnHome', 1: 'btnPick', 2: 'btnSleep' };

        window.sendTask = function(taskNumber) {
            if (taskInProgress) {
                log('Task already in progress, please wait...', 'warn');
                return;
            }
            taskInProgress = true;
            setSlidersEnabled(false);
            setTaskButtonsState(taskNumber);
            const name = TASK_NAMES[taskNumber];
            log(`Sending task: ${name} (id=${taskNumber})`, 'info');
            document.getElementById('taskStatus').textContent = `Executing: ${name}...`;

            fetch('/task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_number: taskNumber })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    log(data.message, 'ok');
                } else {
                    log(data.message, 'err');
                }
                document.getElementById('taskStatus').textContent = data.message;
            })
            .catch(err => {
                log('Connection error: ' + err.message, 'err');
                document.getElementById('taskStatus').textContent = 'Connection error';
            })
            .finally(() => {
                taskInProgress = false;
                setSlidersEnabled(true);
                resetTaskButtons();
            });
        };

        function setTaskButtonsState(activeTask) {
            Object.entries(TASK_BTNS).forEach(([num, id]) => {
                const btn = document.getElementById(id);
                if (parseInt(num) === activeTask) {
                    btn.classList.add('active');
                    btn.disabled = false;
                } else {
                    btn.disabled = true;
                }
            });
        }

        function resetTaskButtons() {
            Object.values(TASK_BTNS).forEach(id => {
                const btn = document.getElementById(id);
                btn.classList.remove('active');
                btn.disabled = false;
            });
        }

        // =====================================================================
        // Voice Control
        // =====================================================================
        let listening = false;
        let recognition = null;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            document.getElementById('speechWarning').innerHTML =
                '<div class="no-speech">Voice not supported in this browser. Use Chrome or Edge.</div>';
            document.getElementById('voiceBtn').style.opacity = '0.3';
            document.getElementById('voiceBtn').style.pointerEvents = 'none';
        }

        window.toggleVoice = function() {
            if (!SpeechRecognition) return;
            if (listening) { recognition.stop(); return; }

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.continuous = false;

            recognition.onstart = () => {
                listening = true;
                document.getElementById('voiceBtn').classList.add('listening');
                document.getElementById('transcript').textContent = 'Listening...';
                log('Voice recognition started', 'info');
            };
            recognition.onresult = (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    text += event.results[i][0].transcript;
                }
                document.getElementById('transcript').textContent = text;
                if (event.results[event.resultIndex].isFinal) {
                    processVoiceCommand(text.toLowerCase().trim());
                }
            };
            recognition.onerror = (event) => {
                log('Voice error: ' + event.error, 'err');
                stopListening();
            };
            recognition.onend = () => stopListening();
            recognition.start();
        };

        function stopListening() {
            listening = false;
            document.getElementById('voiceBtn').classList.remove('listening');
        }

        function processVoiceCommand(text) {
            log(`Heard: "${text}"`, 'info');
            if (text.includes('pick') || text.includes('grab')) {
                sendTask(1);
            } else if (text.includes('sleep') || text.includes('rest')) {
                sendTask(2);
            } else if (text.includes('home') || text.includes('reset') || text.includes('wake')) {
                sendTask(0);
            } else {
                log(`Unknown command: "${text}". Try: home, pick, sleep, wake`, 'warn');
            }
        }

        // =====================================================================
        // Saved Poses
        // =====================================================================
        let poses = {};

        function loadPoses() {
            fetch('/poses').then(r => r.json()).then(data => {
                poses = data;
                renderPoses();
            }).catch(() => {});
        }

        function renderPoses() {
            const list = document.getElementById('poseList');
            const names = Object.keys(poses);
            if (names.length === 0) {
                list.innerHTML = '<div class="pose-empty">No saved poses yet</div>';
                return;
            }
            list.innerHTML = names.map(name => {
                const p = poses[name];
                const vals = p.map(v => v.toFixed(2)).join(', ');
                return `
                    <div class="pose-item">
                        <div>
                            <span class="pose-item-name">${esc(name)}</span>
                            <span class="pose-item-vals">[${vals}]</span>
                        </div>
                        <div class="pose-item-actions">
                            <button class="btn-sm" onclick="loadPose('${esc(name)}')">Load</button>
                            <button class="btn-sm danger" onclick="deletePose('${esc(name)}')">Del</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function esc(s) { return s.replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        window.saveCurrentPose = function() {
            const nameEl = document.getElementById('poseName');
            const name = nameEl.value.trim();
            if (!name) { log('Enter a pose name first', 'warn'); return; }

            fetch('/poses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, positions: sliderPositions })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    log(`Saved pose: ${name}`, 'ok');
                    nameEl.value = '';
                    loadPoses();
                } else {
                    log(data.message, 'err');
                }
            })
            .catch(err => log('Save error: ' + err.message, 'err'));
        };

        window.loadPose = function(name) {
            const p = poses[name];
            if (!p) return;
            setSliderValues(p);
            publishSliderPositions();
            log(`Loaded pose: ${name}`, 'ok');
        };

        window.deletePose = function(name) {
            fetch(`/poses/${encodeURIComponent(name)}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    log(`Deleted pose: ${name}`, 'ok');
                    loadPoses();
                } else {
                    log(data.message, 'err');
                }
            })
            .catch(err => log('Delete error: ' + err.message, 'err'));
        };

        // =====================================================================
        // SSE (Server-Sent Events) — real-time data stream
        // =====================================================================
        let sseRetryCount = 0;

        function connectSSE() {
            const es = new EventSource('/stream');

            es.onmessage = function(event) {
                sseRetryCount = 0;
                try {
                    const data = JSON.parse(event.data);

                    // Joint states
                    if (data.joints) {
                        updateJointMonitor(data.joints);
                    }

                    // Connection status
                    const dot = document.getElementById('statusDot');
                    const txt = document.getElementById('statusText');
                    if (data.connected) {
                        dot.classList.add('connected');
                        txt.textContent = 'Connected';
                    } else {
                        dot.classList.remove('connected');
                        txt.textContent = 'Task server offline';
                    }

                    // Task active state — disable sliders during preset task
                    if (data.task_active && !taskInProgress) {
                        // External task active
                        setSlidersEnabled(false);
                    } else if (!data.task_active && !taskInProgress) {
                        setSlidersEnabled(true);
                    }

                    // Metrics
                    if (data.metrics) {
                        const m = data.metrics;
                        document.getElementById('headerTasks').textContent = m.tasks_sent;
                        document.getElementById('headerRate').textContent = m.success_rate + '%';
                        document.getElementById('metricSent').textContent = m.tasks_sent;
                        document.getElementById('metricRate').textContent = m.success_rate + '%';
                        document.getElementById('metricAvg').textContent = m.avg_execution_time + 's';
                        document.getElementById('metricFailed').textContent = m.tasks_failed;
                    }
                } catch (e) {
                    // Ignore parse errors
                }
            };

            es.onerror = function() {
                es.close();
                sseRetryCount++;
                const delay = Math.min(1000 * Math.pow(2, sseRetryCount), 10000);
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Reconnecting...';
                setTimeout(connectSSE, delay);
            };
        }

        // =====================================================================
        // Init
        // =====================================================================
        buildJointMonitor();
        buildSliders();
        loadPoses();
        connectSSE();
        log('Dexter Dashboard initialized', 'ok');

    })();
    </script>
</body>
</html>
