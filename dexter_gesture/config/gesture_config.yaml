# gesture_config.yaml
# Parameters for the gesture_receiver node (jerk-bounded 4-stage pipeline).
#
# Load with:
#   ros2 launch dexter_gesture gesture_control.launch.py \
#       --ros-args --params-file /path/to/gesture_config.yaml
#
# Pipeline stages:
#   A. Deadband -- ignore sensor jitter below `deadband_deg`
#   B. Low-pass one-pole EMA with `low_pass_alpha`
#   C. Jerk-bounded S-curve smoother, runs at `smoother_rate_hz` on a
#      wall-clock timer (independent of UDP arrival rate)
#   D. Trajectory publish deadband -- skip publishes under `publish_deadband_rad`

gesture_receiver:
  ros__parameters:

    # ── Network ────────────────────────────────────────────────
    udp_port: 5005            # Must match ESP32 UDP_PORT

    # ── Stage A: deadband ──────────────────────────────────────
    # Angle change below this (degrees) is ignored (hand tremor filter).
    # 0.5 deg filters tremor; raise to 1.0 if micro-jitters still slip through.
    deadband_deg: 0.5

    # ── Stage B: low-pass one-pole EMA ─────────────────────────
    # Output += alpha * (input - output)
    # 0.0 = frozen, 1.0 = raw (no smoothing). Default 0.12 settles ~5s.
    low_pass_alpha: 0.12

    # ── Stage C: jerk-bounded S-curve smoother ─────────────────
    # Runs on a wall-clock timer, decoupled from UDP rate (e.g. 50Hz ESP32).
    smoother_rate_hz: 100

    # Arm (joints 1..3): tuned for a 3-DOF arm with hobby servos.
    max_velocity_rad_s:       1.2
    max_acceleration_rad_s2:  6.0
    max_jerk_rad_s3:          8.0
    settling_time_s:          0.15

    # Gripper (joint 4): slower, gentler -- gripper is more delicate.
    gripper_max_velocity_rad_s:       0.8
    gripper_max_acceleration_rad_s2:  4.0
    gripper_max_jerk_rad_s3:          5.0
    gripper_settling_time_s:          0.20

    # ── Stage D: publish deadband ──────────────────────────────
    # Suppress trajectory messages whose endpoints moved less than this
    # (radians) since the last publish. Saves bandwidth below the jitter
    # floor of the smoother but preserves device-command frequency.
    publish_deadband_rad: 0.005

    # ── Controller timing ──────────────────────────────────────
    # How long (ms) the controller gets to reach each commanded pose.
    # 80ms works well at 50Hz. Increase to 120 if joints oscillate.
    trajectory_duration_ms: 80

    # ── Axis inversion ─────────────────────────────────────────
    # If any joint moves OPPOSITE to what you expect, flip it here.
    invert_roll:  false    # roll  → elbow fine-tune offset
    invert_pitch: false    # pitch → arm reach (shoulder + elbow)
    invert_yaw:   false    # yaw   → base rotation

    # ── Reach coupling gains ───────────────────────────────────
    # When you tilt your wrist forward (pitch), the arm "reaches"
    # forward by moving both shoulder and elbow together.
    #
    # shoulder_gain: how strongly pitch drives joint_2 (shoulder)
    # elbow_gain:    how strongly pitch drives joint_3 (elbow)
    #
    # Both = 1.0  → maximum reach arc
    # shoulder_gain=1.0, elbow_gain=0.6  → smoother arc (default)
    # shoulder_gain=0.8, elbow_gain=0.8  → more symmetric
    # Set elbow_gain=0.0 to disable elbow coupling (pitch = shoulder only)
    shoulder_gain: 1.0
    elbow_gain:    0.6

    # ── Flex sensor calibration ────────────────────────────────
    # 1. Flash ESP32, open Serial Monitor, hold hand OPEN
    #    → note the "Flex:" value → set as flex_open_adc
    # 2. Make a FIST → note the value → set as flex_closed_adc
    # 3. Update here and restart the ROS node (no reflash needed)
    #
    # With 10kΩ pullup + 2.2" Electrobot flex sensor, typical values:
    #   Open:   ~2900   Closed: ~3700
    # (your sensor may differ slightly — always calibrate)
    flex_open_adc:   2900.0
    flex_closed_adc: 3700.0
